<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pickleball Spot Poller</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 24px 16px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header .emoji { font-size: 3rem; display: block; margin-bottom: 8px; }
    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #34d399, #22d3ee);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    header p { color: #94a3b8; margin-top: 4px; font-size: 0.9rem; }

    /* ── Layout ── */
    .container { max-width: 760px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

    /* ── Cards ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 24px;
    }
    .card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .05em;
      margin-bottom: 16px;
    }

    /* ── Form ── */
    .form-row { display: flex; gap: 16px; flex-wrap: wrap; }
    .field { flex: 1; min-width: 160px; }
    .field label { display: block; font-size: 0.85rem; color: #94a3b8; margin-bottom: 6px; }
    .field input {
      width: 100%;
      padding: 10px 14px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #34d399; }
    .field .hint { font-size: 0.75rem; color: #64748b; margin-top: 4px; }

    /* ── Buttons ── */
    .btn-row { display: flex; gap: 12px; margin-top: 20px; flex-wrap: wrap; }
    button {
      padding: 11px 24px;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #btn-start { background: linear-gradient(135deg, #34d399, #22d3ee); color: #0f172a; }
    #btn-stop  { background: #ef4444; color: #fff; }

    /* ── Status Badge ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }
    .badge.idle    { background: #1e293b; border: 1px solid #475569; color: #94a3b8; }
    .badge.running { background: #052e16; border: 1px solid #16a34a; color: #4ade80; }
    .badge.done    { background: #0c1a3b; border: 1px solid #3b82f6; color: #93c5fd; }
    .badge.error   { background: #2d0c0c; border: 1px solid #ef4444; color: #fca5a5; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; }
    .dot.pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.3; } }

    .progress-text { color: #e2e8f0; font-size: 0.9rem; }
    .countdown { color: #facc15; font-size: 0.9rem; font-variant-numeric: tabular-nums; }

    /* ── Log ── */
    #log-box {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 12px 14px;
      height: 220px;
      overflow-y: auto;
      font-family: 'Courier New', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      scroll-behavior: smooth;
    }
    .log-line { padding: 1px 0; }
    .log-line .ts  { color: #475569; margin-right: 8px; }
    .log-line.error   .msg { color: #f87171; }
    .log-line.found   .msg { color: #4ade80; font-weight: 700; }
    .log-line.waiting .msg { color: #facc15; }
    .log-line.tick { display: none; }

    /* ── Results ── */
    #results-list { display: flex; flex-direction: column; gap: 12px; }
    .result-card {
      background: #052e16;
      border: 1px solid #16a34a;
      border-radius: 8px;
      padding: 14px 16px;
    }
    .result-card .r-name { font-weight: 700; color: #4ade80; margin-bottom: 4px; font-size: 0.95rem; }
    .result-card .r-spots { color: #86efac; font-size: 0.85rem; margin-bottom: 4px; }
    .result-card .r-details { color: #94a3b8; font-size: 0.8rem; white-space: pre-wrap; word-break: break-word; }
    .result-card .r-time { color: #64748b; font-size: 0.75rem; margin-top: 6px; }

    .empty-state { color: #475569; font-size: 0.9rem; font-style: italic; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .form-row { flex-direction: column; }
      .btn-row  { flex-direction: column; }
      button    { width: 100%; }
    }
  </style>
</head>
<body>

<header>
  <span class="emoji">🏓</span>
  <h1>Pickleball Spot Poller</h1>
  <p>Auto-checks Richmond Hill Active Communities for open pickleball spots (age 40–50)</p>
</header>

<div class="container">

  <!-- Configure -->
  <div class="card">
    <h2>Configure Poll</h2>
    <div class="form-row">
      <div class="field">
        <label for="poll-count">Number of polls</label>
        <input id="poll-count" type="number" min="1" max="200" value="10" placeholder="e.g. 10" />
        <div class="hint">How many times to check</div>
      </div>
      <div class="field">
        <label for="interval">Interval (minutes)</label>
        <input id="interval" type="number" min="0.5" max="120" step="0.5" value="30" placeholder="e.g. 30" />
        <div class="hint">Time between each poll</div>
      </div>
    </div>
    <div class="btn-row">
      <button id="btn-start">▶ Start Polling</button>
      <button id="btn-stop" disabled>■ Stop</button>
    </div>
    <div id="form-error" style="color:#f87171;font-size:0.85rem;margin-top:10px;display:none;"></div>
  </div>

  <!-- Status -->
  <div class="card">
    <h2>Status</h2>
    <div class="status-bar">
      <div id="badge" class="badge idle"><span class="dot"></span><span id="badge-text">Idle</span></div>
      <span id="progress-text" class="progress-text" style="display:none;"></span>
      <span id="countdown" class="countdown" style="display:none;"></span>
    </div>
  </div>

  <!-- Log -->
  <div class="card">
    <h2>Activity Log</h2>
    <div id="log-box"><span class="empty-state">Logs will appear here once polling starts…</span></div>
  </div>

  <!-- Results -->
  <div class="card">
    <h2>Open Spots Found</h2>
    <div id="results-list"><span class="empty-state">No open spots found yet.</span></div>
  </div>

</div>

<script>
  const btnStart = document.getElementById('btn-start');
  const btnStop  = document.getElementById('btn-stop');
  const formErr  = document.getElementById('form-error');
  const logBox   = document.getElementById('log-box');
  const resultsList = document.getElementById('results-list');
  const badge    = document.getElementById('badge');
  const badgeText = document.getElementById('badge-text');
  const progressText = document.getElementById('progress-text');
  const countdownEl  = document.getElementById('countdown');

  let logEmpty = true;
  let resultsEmpty = true;

  // ── SSE ────────────────────────────────────────────────────────────────
  function connectSSE() {
    const es = new EventSource('/api/events');
    es.onmessage = e => handleEvent(JSON.parse(e.data));
    es.onerror = () => setTimeout(connectSSE, 3000);
  }

  function handleEvent(data) {
    const { type, message, state, results } = data;

    if (state) updateUI(state);
    if (message && type !== 'tick') appendLog(type, message);
    if (results && results.length > 0) appendResults(results);
  }

  // ── UI Updates ─────────────────────────────────────────────────────────
  function updateUI(state) {
    // Buttons
    btnStart.disabled = state.running;
    btnStop.disabled  = !state.running;

    // Badge
    badge.className = 'badge';
    const dot = badge.querySelector('.dot');
    dot.className = 'dot';

    if (state.running) {
      badge.classList.add('running');
      badgeText.textContent = 'Running';
      dot.classList.add('pulse');
    } else if (state.iteration > 0 && state.iteration >= state.total) {
      badge.classList.add('done');
      badgeText.textContent = 'Complete';
    } else if (state.iteration > 0) {
      badge.classList.add('idle');
      badgeText.textContent = 'Stopped';
    } else {
      badge.classList.add('idle');
      badgeText.textContent = 'Idle';
    }

    // Progress
    if (state.total > 0) {
      progressText.style.display = '';
      progressText.textContent = `Poll ${state.iteration} / ${state.total}`;
    } else {
      progressText.style.display = 'none';
    }

    // Countdown
    if (state.nextPollInSeconds !== null && state.nextPollInSeconds > 0) {
      const m = Math.floor(state.nextPollInSeconds / 60);
      const s = state.nextPollInSeconds % 60;
      countdownEl.style.display = '';
      countdownEl.textContent = `Next poll in ${m}:${String(s).padStart(2,'0')}`;
    } else {
      countdownEl.style.display = 'none';
    }
  }

  function appendLog(type, message) {
    if (logEmpty) { logBox.innerHTML = ''; logEmpty = false; }
    const line = document.createElement('div');
    line.className = `log-line ${type}`;
    const now = new Date().toLocaleTimeString('en-CA', { hour12: false });
    line.innerHTML = `<span class="ts">[${now}]</span><span class="msg">${escHtml(message)}</span>`;
    logBox.appendChild(line);
    logBox.scrollTop = logBox.scrollHeight;
  }

  function appendResults(newResults) {
    if (resultsEmpty) { resultsList.innerHTML = ''; resultsEmpty = false; }
    newResults.forEach(r => {
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML = `
        <div class="r-name">🎉 ${escHtml(r.name)}</div>
        <div class="r-spots">Spots: ${escHtml(r.spots)}</div>
        <div class="r-details">${escHtml(r.details)}</div>
        <div class="r-time">Found at ${escHtml(r.foundAt)}</div>
      `;
      resultsList.prepend(card);
    });
  }

  function escHtml(str) {
    return String(str ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  // ── Start ──────────────────────────────────────────────────────────────
  btnStart.addEventListener('click', async () => {
    formErr.style.display = 'none';
    const pollCount = document.getElementById('poll-count').value;
    const intervalMinutes = document.getElementById('interval').value;

    if (!pollCount || pollCount < 1) {
      showError('Please enter a poll count of at least 1.'); return;
    }
    if (!intervalMinutes || intervalMinutes < 0.5) {
      showError('Please enter an interval of at least 0.5 minutes.'); return;
    }

    const res = await fetch('/api/start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ pollCount: Number(pollCount), intervalMinutes: Number(intervalMinutes) }),
    });
    const data = await res.json();
    if (data.error) showError(data.error);
  });

  // ── Stop ───────────────────────────────────────────────────────────────
  btnStop.addEventListener('click', async () => {
    await fetch('/api/stop', { method: 'POST' });
  });

  function showError(msg) {
    formErr.textContent = msg;
    formErr.style.display = 'block';
  }

  // ── Init ───────────────────────────────────────────────────────────────
  connectSSE();
</script>
</body>
</html>
